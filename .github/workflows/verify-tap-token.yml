name: verify tap token

# Manual diagnostic: checks whether TAP_GITHUB_TOKEN can WRITE to the Homebrew
# tap (the exact thing the release's cask push needs). It creates and then
# deletes a throwaway file in StackSatoshis/homebrew-tap. No release impact.
# Run from the Actions tab, or: gh workflow run verify-tap-token.yml
on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Write + delete a test file in homebrew-tap
        env:
          GH_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          set -e
          REPO=StackSatoshis/homebrew-tap
          FILE=.safu-token-check

          echo "→ attempting write (this is what the cask push does)…"
          gh api --method PUT "repos/$REPO/contents/$FILE" \
            -f message="safu token check" \
            -f content="$(printf 'ok' | base64)"
          echo "✓ WRITE OK — the token can push to the tap"

          echo "→ cleaning up the test file…"
          SHA=$(gh api "repos/$REPO/contents/$FILE" --jq .sha)
          gh api --method DELETE "repos/$REPO/contents/$FILE" \
            -f message="safu token check cleanup" -f sha="$SHA"
          echo "✓ token verified — releases will now publish the cask automatically"
